<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebook Islam — Koleksi Digital Salaf</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f3f0; color: #2d2a24; line-height: 1.6; }
        
        /* Header */
        .hero { background: linear-gradient(135deg, #1a3a2a 0%, #2d5a3e 100%); color: #fff; padding: 80px 20px 60px; text-align: center; }
        .hero h1 { font-size: 2.8em; margin-bottom: 10px; font-weight: 700; }
        .hero h1 span { color: #c9a96e; }
        .hero p { font-size: 1.15em; opacity: 0.9; max-width: 700px; margin: 10px auto; }
        .hero .stats { display: flex; gap: 30px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        .hero .stat { background: rgba(255,255,255,0.1); padding: 15px 30px; border-radius: 12px; }
        .hero .stat .num { font-size: 2em; font-weight: 700; }
        .hero .stat .label { font-size: 0.85em; opacity: 0.8; }
        
        /* Search & Filter */
        .controls { max-width: 1200px; margin: -25px auto 30px; padding: 0 20px; position: relative; z-index: 10; }
        .search-box { width: 100%; padding: 16px 20px; border: none; border-radius: 14px; font-size: 1.05em; 
            background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        /* Categories */
        .categories { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .cat-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; }
        .cat-tab { padding: 8px 18px; border-radius: 20px; border: 1.5px solid #ccc; cursor: pointer; font-size: 0.9em;
            transition: all 0.2s; background: #fff; }
        .cat-tab:hover, .cat-tab.active { background: #1a3a2a; color: #fff; border-color: #1a3a2a; }
        
        /* Catalog Grid */
        .catalog { max-width: 1200px; margin: 0 auto; padding: 0 20px 50px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .book-card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            cursor: pointer; transition: all 0.2s; border: 1px solid #e8e5e0; }
        .book-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
        .book-card .cat-badge { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 0.75em;
            background: #e8f0ea; color: #1a3a2a; margin-bottom: 8px; }
        .book-card h3 { font-size: 1em; font-weight: 600; margin-bottom: 6px; color: #2d2a24; }
        .book-card .meta { font-size: 0.82em; color: #888; }
        
        /* PDF Viewer Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); }
        .modal.show { display: flex; align-items: center; justify-content: center; }
        .modal-content { width: 90%; height: 90%; background: #fff; border-radius: 12px; overflow: hidden; position: relative; }
        .modal iframe { width: 100%; height: 100%; border: none; }
        .modal-close { position: absolute; top: 12px; right: 16px; font-size: 28px; color: #fff; cursor: pointer; z-index: 10; background: rgba(0,0,0,0.3); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; }
        .modal-actions { position: absolute; top: 12px; right: 60px; z-index: 10; display: flex; gap: 8px; }
        .modal-actions a { padding: 8px 16px; background: #1a3a2a; color: #fff; text-decoration: none; border-radius: 8px; font-size: 0.85em; }
        
        /* Footer */
        footer { text-align: center; padding: 30px 20px; color: #888; font-size: 0.85em; border-top: 1px solid #e0ddd8; }
        
        @media (max-width: 600px) {
            .hero h1 { font-size: 2em; }
            .catalog { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>📚 <span>Ebook</span> Islam</h1>
        <p>Koleksi digital eBook Islam salaf — PAKET A I AM STUDENT</p>
        <div class="stats">
            <div class="stat">
                <div class="num" id="totalBooks">241</div>
                <div class="label">eBook PDF</div>
            </div>
            <div class="stat">
                <div class="num" id="totalCategories">11</div>
                <div class="label">Kategori</div>
            </div>
            <div class="stat">
                <div class="num">633 MB</div>
                <div class="label">Total Size</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 Cari judul ebook..." oninput="filterBooks()">
    </div>

    <div class="categories">
        <div class="cat-tabs" id="catTabs">
            <div class="cat-tab active" onclick="filterCategory('all')">Semua</div>
        </div>
    </div>

    <div class="catalog" id="catalog"></div>

    <!-- Modal PDF Viewer -->
    <div class="modal" id="pdfModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-actions">
                <a id="downloadBtn" href="#" download>⬇ Download</a>
            </div>
            <iframe id="pdfViewer" src=""></iframe>
        </div>
    </div>

    <footer>
        <p>Dipersiapkan oleh Pondok Informatika • 24 Mei 2026</p>
        <p style="margin-top:6px;font-size:0.85em;opacity:0.7">Sumber: PAKET A - I AM STUDENT</p>
    </footer>

    <script>
        // ========== DATA BUKU ==========
        // Generated by build script - update with real data
        async function loadBooks() {
            try {
                const resp = await fetch('/books.json');
                const BOOKS = await resp.json();
                window.BOOKS = BOOKS;
                renderCategories();
                renderBooks('all', '');
                document.getElementById('totalBooks').textContent = BOOKS.length;
            } catch(e) {
                document.getElementById('catalog').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#888;">Gagal memuat data buku. Coba refresh.</div>';
            }
        }
        // ========== GENERATE KATEGORI ==========
        const CATEGORIES = {};
        (window.BOOKS || []).forEach(b => { if(!CATEGORIES[b.cat]) CATEGORIES[b.cat] = 0; CATEGORIES[b.cat]++; });

        // ========== RENDER ==========
        function renderCategories() {
            const tabs = document.getElementById('catTabs');
            Object.keys(CATEGORIES).sort().forEach(cat => {
                const tab = document.createElement('div');
                tab.className = 'cat-tab';
                tab.textContent = `${cat} (${CATEGORIES[cat]})`;
                tab.onclick = () => filterCategory(cat);
                tabs.appendChild(tab);
            });
        }

        function renderBooks(filter = 'all', search = '') {
            const container = document.getElementById('catalog');
            const filtered = (window.BOOKS || []).filter(b => {
                const matchCat = filter === 'all' || b.cat === filter;
                const matchSearch = !search || b.title.toLowerCase().includes(search.toLowerCase());
                return matchCat && matchSearch;
            });
            
            if (filtered.length === 0) {
                container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#888;">Tidak ada buku ditemukan</div>';
                return;
            }
            
            container.innerHTML = filtered.map(b => `
                <div class="book-card" onclick="openPDF('${b.path.replace(/'/g, "\\'")}', '${b.title.replace(/'/g, "\\'")}', '${b.path.replace(/'/g, "\\'")}')">
                    <span class="cat-badge">${b.cat}</span>
                    <h3>${b.title}</h3>
                    <div class="meta">${b.size || ''}</div>
                </div>
            `).join('');
        }

        function filterBooks() {
            const search = document.getElementById('searchInput').value;
            const active = document.querySelector('.cat-tab.active');
            const filter = active ? active.textContent.split(' ')[0] : 'all';
            if (filter === 'Semua') renderBooks('all', search);
            else renderBooks(filter, search);
        }

        function filterCategory(cat) {
            document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('searchInput').value = '';
            renderBooks(cat === 'all' ? 'all' : cat, '');
        }

        // ========== PDF VIEWER ==========
        function openPDF(path, title, downloadPath) {
            const baseUrl = window.location.origin;
            const pdfUrl = `${baseUrl}/${encodeURI(path)}`;
            document.getElementById('pdfViewer').src = pdfUrl;
            document.getElementById('downloadBtn').href = pdfUrl;
            document.getElementById('pdfModal').classList.add('show');
            document.title = `📖 ${title} — Ebook Islam`;
        }

        function closeModal() {
            document.getElementById('pdfModal').classList.remove('show');
            document.getElementById('pdfViewer').src = '';
            document.title = 'Ebook Islam — Koleksi Digital Salaf';
        }

        // Close on backdrop click
        document.getElementById('pdfModal').onclick = function(e) {
            if (e.target === this) closeModal();
        };

        // ESC key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        // Init
        loadBooks();
    </script>
</body>
</html>
